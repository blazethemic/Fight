<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MAGIC</title><style>body{margin:0;overflow:hidden;background:#73cfff;font-family:Arial}canvas{display:block}#hud{position:fixed;top:10px;left:10px;color:#fff;font-weight:bold}#start,#restart{position:fixed;left:50%;transform:translateX(-50%);padding:16px 28px;font-size:22px;border:none;border-radius:16px}#start{top:45%}#restart{top:58%;display:none}#controls{position:fixed;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:14px}#controls button{width:72px;height:72px;border:none;border-radius:50%;font-size:28px}</style></head><body><div id=hud>Round <span id=r>1</span>/3 | Time <span id=t>20</span> | Money $<span id=m>0</span>/$1000</div><button id=start>▶ START</button><button id=restart>🔄 RESTART</button><div id=controls><button id=left>⬅️</button><button id=down>⬇️</button><button id=jump>⬆️</button><button id=right>➡️</button></div><canvas id=game></canvas><script>const c=game,ctx=c.getContext('2d');function size(){c.width=innerWidth;c.height=innerHeight}size();onresize=size;const G=c.height-230;let playing=false,round=1,time=20,money=0,bags=[];const p={x:180,y:G,vy:0,crouch:false,onGround:true};let L=false,R=false;start.onclick=()=>{playing=true;start.style.display='none';clock()};restart.onclick=()=>location.reload();left.onpointerdown=()=>L=true;left.onpointerup=()=>L=false;right.onpointerdown=()=>R=true;right.onpointerup=()=>R=false;down.onpointerdown=()=>p.crouch=true;down.onpointerup=()=>p.crouch=false;jump.onclick=()=>{if(p.onGround){p.vy=-18;p.onGround=false}};setInterval(()=>{if(playing)bags.push({x:c.width+50,y:G-60-Math.random()*120})},700);function clock(){let z=setInterval(()=>{if(!playing)return;time--;t.textContent=time;if(money>=1000){end('🏆 YOU WIN');clearInterval(z)}if(time<=0){round++;if(round<=3){r.textContent=round;time=20}else{end('⏰ TIME UP');clearInterval(z)}}},1000)}function end(x){playing=false;alert(x);restart.style.display='block'}function loop(){requestAnimationFrame(loop);ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#2f8f2f';ctx.fillRect(0,c.height-90,c.width,90);if(L)p.x-=6;if(R)p.x+=6;if(!p.onGround){p.vy+=1;p.y+=p.vy}if(p.y>=G){p.y=G;p.vy=0;p.onGround=true}let h=p.crouch?55:90;ctx.fillStyle='#5a3825';ctx.fillRect(p.x,p.y+(90-h),55,h);ctx.fillStyle='black';ctx.beginPath();ctx.arc(p.x+28,p.y-10+(90-h),30,0,7);ctx.fill();ctx.font='50px Arial';bags.forEach((b,i)=>{b.x-=10;ctx.fillText('💰',b.x,b.y);if(b.x<p.x+70&&Math.abs(p.y-b.y)<100){money+=100;m.textContent=money;bags.splice(i,1)}})}loop();</script></body></html>
