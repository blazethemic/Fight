<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>95Rich Money Run</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial;background:#73c8ff}
canvas{display:block}
#hud{position:fixed;top:10px;left:10px;color:#fff;font-weight:bold;font-size:18px;z-index:10}
#start,#restart{position:fixed;left:50%;transform:translateX(-50%);padding:16px 30px;font-size:22px;border:none;border-radius:18px;z-index:20}
#start{top:45%}#restart{top:55%;display:none}
#controls{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:20px;z-index:10}
#controls button{width:80px;height:80px;border:none;border-radius:50%;font-size:30px}
</style></head><body>
<div id='hud'>Round <span id='r'>1</span>/3 | Time <span id='t'>20</span> | Money $<span id='m'>0</span>/$1000</div>
<button id='start'>▶ START GAME</button>
<button id='restart'>🔄 RESTART</button>
<div id='controls'><button id='left'>⬅️</button><button id='jump'>⬆️</button><button id='right'>➡️</button></div>
<canvas id='game'></canvas>
<script>
const c=game,ctx=c.getContext('2d');function size(){c.width=innerWidth;c.height=innerHeight}size();onresize=size;
let playing=false,round=1,time=20,money=0;let bags=[];let platforms=[500,850,1200,1600,2000];
const p={x:160,y:0,vy:0};let left=false,right=false;
function spawnBag(){bags.push({x:c.width+50,y:150+Math.random()*250});}
setInterval(()=>{if(playing)spawnBag()},600);
left.onclick=()=>left=true;right.onclick=()=>right=true;jump.onclick=()=>{if(p.y===0)p.vy=-18};
left.ontouchstart=()=>left=true;left.ontouchend=()=>left=false;right.ontouchstart=()=>right=true;right.ontouchend=()=>right=false;
document.addEventListener('keydown',e=>{if(e.code==='ArrowLeft')left=true;if(e.code==='ArrowRight')right=true;if((e.code==='ArrowUp'||e.code==='Space')&&p.y===0)p.vy=-18});
document.addEventListener('keyup',e=>{if(e.code==='ArrowLeft')left=false;if(e.code==='ArrowRight')right=false});
start.onclick=()=>{playing=true;start.style.display='none';clock()};restart.onclick=()=>location.reload();
function clock(){let x=setInterval(()=>{if(!playing)return;time--;t.textContent=time;if(money>=1000){finish(true);clearInterval(x)}if(time<=0){round++;if(round<=3){r.textContent=round;time=20}else{finish(false);clearInterval(x)}}},1000)}
function finish(win){playing=false;restart.style.display='block';alert(win?'🏆 YOU WON!':'⏰ GAME OVER')}
function player(){let y=c.height-230-p.y;ctx.fillStyle='#5a3825';ctx.fillRect(p.x,y,55,95);ctx.fillStyle='black';ctx.beginPath();ctx.arc(p.x+28,y-10,34,0,7);ctx.fill();ctx.strokeStyle='#dff';ctx.lineWidth=4;ctx.beginPath();ctx.arc(p.x+28,y+20,18,0,3.14);ctx.stroke();ctx.beginPath();ctx.moveTo(p.x-5,y+25);ctx.lineTo(p.x+60,y+25);ctx.moveTo(p.x+15,y+95);ctx.lineTo(p.x+10,y+135);ctx.moveTo(p.x+40,y+95);ctx.lineTo(p.x+45,y+135);ctx.stroke();}
function loop(){requestAnimationFrame(loop);ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#2f8f2f';ctx.fillRect(0,c.height-90,c.width,90);for(let i=0;i<8;i++){ctx.fillStyle='#8b5a2b';ctx.fillRect(i*240+80,c.height-300,18,210);ctx.fillStyle='#228b22';ctx.beginPath();ctx.arc(i*240+90,c.height-320,45,0,7);ctx.fill()}ctx.fillStyle='#444';platforms.forEach(x=>ctx.fillRect(x,c.height-180,120,20));ctx.fillStyle='red';for(let i=0;i<3;i++)ctx.fillRect(i*250+200,c.height-140,90,40);if(!playing){player();return}if(left)p.x-=6;if(right)p.x+=6;p.vy+=1;p.y+=p.vy;if(p.y<0){p.y=0;p.vy=0}player();bags.forEach((b,i)=>{b.x-=10;ctx.font='50px Arial';ctx.fillText('💰',b.x,b.y);if(b.x<p.x+70&&Math.abs((c.height-230-p.y)-b.y)<90){money+=100;m.textContent=money;bags.splice(i,1)}})}loop();
</script></body></html>
